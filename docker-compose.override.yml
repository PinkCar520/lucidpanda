# This file is for LOCAL DEVELOPMENT only.
# It is automatically merged with docker-compose.yml by Docker Compose.
# It enables local builds and hot-reloading.

services:
  # Build backend services from local source
  db:
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.backend
    volumes:
      - ./apps/api:/app
      - ./logs:/app/logs

  collector:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.backend
    volumes:
      - ./apps/api:/app
      - ./logs:/app/logs

  funds_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.backend
    volumes:
      - ./apps/api:/app
      - ./logs:/app/logs

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.backend
    volumes:
      - ./apps/api:/app
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  # Build frontend from local source
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    # If you need hot reload for Next.js inside Docker, uncomment below:
    # volumes:
    #   - ./apps/web:/app
    #   - /app/node_modules
    #   - /app/.next
