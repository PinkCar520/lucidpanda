[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
# Start with core, broadly-adopted rules; tighten over time.
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ["lucidpanda", "src"]

[tool.ruff.lint.per-file-ignores]
"src/lucidpanda/api/v1/routers/*.py" = ["B008"]
"src/lucidpanda/auth/*.py" = ["B008"]
"src/lucidpanda/tasks/collector_tasks.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
python_version = "3.11"
mypy_path = "."
explicit_package_bases = true
namespace_packages = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
no_implicit_optional = true
ignore_missing_imports = true
show_error_codes = true
pretty = true

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true
