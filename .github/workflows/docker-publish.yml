name: Build and Push Docker Images
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'infra/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  prep:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  build-and-push-backend:
    name: Build and Push Backend Image
    needs: prep
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check for backend changes
        id: check_backend
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/api/**'
              - 'packages/**'
              - 'docker-compose.yml'

      - name: Log in to Docker Hub
        if: steps.check_backend.outputs.backend == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        if: steps.check_backend.outputs.backend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        if: steps.check_backend.outputs.backend == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: pincar/lucidpanda-backend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prep.outputs.sha_short }}

      - name: Build and push backend Docker image
        if: steps.check_backend.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-db:
    name: Build and Push DB Image
    needs: prep
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check for DB changes
        id: check_db
        uses: dorny/paths-filter@v3
        with:
          filters: |
            db:
              - 'infra/postgres/**'
              - 'docker-compose.yml'

      - name: Log in to Docker Hub
        if: steps.check_db.outputs.db == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        if: steps.check_db.outputs.db == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        if: steps.check_db.outputs.db == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: pincar/lucidpanda-db
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prep.outputs.sha_short }}

      - name: Build and push DB Docker image
        if: steps.check_db.outputs.db == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./infra/postgres
          file: ./infra/postgres/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-frontend:
    name: Build and Push Frontend Image
    needs: prep
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for frontend changes
        id: check_frontend
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/web/**'
              - 'packages/**'

      - name: Log in to Docker Hub
        if: steps.check_frontend.outputs.frontend == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        if: steps.check_frontend.outputs.frontend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        if: steps.check_frontend.outputs.frontend == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: pincar/lucidpanda-web
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prep.outputs.sha_short }}

      - name: Build and push frontend Docker image
        if: steps.check_frontend.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          build-args: |
            CACHE_BUST=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Auto Deploy to Server
    needs: [build-and-push-backend, build-and-push-frontend, build-and-push-db]
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull and Restart Containers
        run: |
          cd ~/lucidpanda 2>/dev/null || cd ~/lucidpanda
          docker compose pull
          docker compose up -d
          docker image prune -f
